<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#071018;
color:white;
text-align:center;
}

/* NAV */

nav{
position:relative;
display:flex;
justify-content:center;
align-items:center;
padding:20px 30px;
border-bottom:1px solid #222;
width:100%;
box-sizing:border-box;
}

.menu{
display:flex;
gap:20px;
}

.menu a{
color:white;
text-decoration:none;
font-size:18px;
}

.lang{
position:absolute;
right:30px;
display:flex;
gap:12px;
align-items:center;
}

.lang a{
color:white;
text-decoration:none;
font-size:14px;
display:flex;
align-items:center;
gap:6px;
}

.lang img{
width:22px;
border-radius:2px;
}

/* CONTENT */

.container{
padding:60px 20px;
}

.books{
display:flex;
justify-content:center;
align-items:flex-start;
gap:60px;
flex-wrap:wrap;
margin-top:40px;
}

.book{
width:320px;
display:flex;
flex-direction:column;
align-items:center;
}

.book img{
width:100%;
border-radius:8px;
height:auto;
}

.book h3{
margin-top:20px;
min-height:48px;
}

.buttons{
margin-top:12px;
display:flex;
flex-direction:column;
gap:12px;
width:100%;
}

.btn{
padding:14px 22px;
border-radius:25px;
text-decoration:none;
display:block;
}

.btn-white{
background:white;
color:black;
}

.btn-sample{
background:#f5c84c;
color:black;
font-weight:bold;
}

/* MOBILE */

@media (max-width:768px){

nav{
flex-direction:column;
gap:10px;
}

.lang{
position:static;
}

.books{
flex-direction:column;
align-items:center;
gap:50px;
}

}

</style>
</head>
